name: Dependency Remediation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    uses: opsbento/security-workflows/.github/workflows/dependency-remediation.yml@v1
    secrets:
      REMEDIATION_TOKEN: ${{ secrets.REMEDIATION_TOKEN }}
    with:
      working-directory: "."
      ecosystem: npm
      minimum-severity: high
      allow-major: false
      maximum-updates: 25
      remediation-core-version: v0.2.6
      security-workflows-ref: v1
      upload-artifacts: false
      pr-labels: ""
