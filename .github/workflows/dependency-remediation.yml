name: Dependency Remediation

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    uses: opsbento/security-workflows/.github/workflows/dependency-remediation.yml@main
    secrets:
      REMEDIATION_TOKEN: ${{ secrets.REMEDIATION_TOKEN }}
    with:
      working-directory: "."
      ecosystem: npm
      minimum-severity: high
      allow-major: false
      maximum-updates: 5
      remediation-core-version: v0.2.3
      security-workflows-ref: main
      upload-artifacts: false
      pr-labels: ""
