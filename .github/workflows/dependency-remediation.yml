name: Dependency Remediation

on:
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  remediate:
    uses: opsbento/security-workflows/.github/workflows/dependency-remediation.yml@main
    with:
      working-directory: "."
      ecosystem: npm
      minimum-severity: high
      allow-major: false
      maximum-updates: 1
      remediation-core-ref: main
      security-workflows-ref: main
