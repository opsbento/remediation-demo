name: Dependency Scan

on:
  workflow_dispatch:
  pull_request:
    paths:
      - package.json
      - package-lock.json

permissions:
  contents: read

jobs:
  scan:
    if: github.event_name != 'pull_request' || !startsWith(github.head_ref, 'remediation/')
    uses: opsbento/security-workflows/.github/workflows/dependency-scan.yml@main
    with:
      working-directory: "."
      minimum-severity: high
      security-workflows-ref: main
      upload-artifacts: false
